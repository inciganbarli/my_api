version: "3.8"

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: movie_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: moviedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: movie_redis
    ports:
      - "6379:6379"

  # Node.js app
  app:
    build: .
    container_name: movie_api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: moviedb
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: my_super_secret_key_12345
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      SESSION_SECRET: my_session_secret_12345
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-your_github_client_id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-your_github_client_secret}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3000/auth/github/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # server.js auto-seeds the database if empty — no need to run seed.js here
    command: node server.js

volumes:
  postgres_data:
